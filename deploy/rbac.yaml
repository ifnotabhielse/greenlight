apiVersion: v1
kind: ServiceAccount
metadata:
  name: greenlight
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: greenlight
rules:
  - apiGroups: ["greenlight.dev"]
    resources: ["modelrollouts", "modelrollouts/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # TODO: add KServe InferenceService / Istio VirtualService verbs when traffic-shifting is wired.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: greenlight
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: greenlight
subjects:
  - kind: ServiceAccount
    name: greenlight
    namespace: default
